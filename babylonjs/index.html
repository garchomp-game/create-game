<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Arena Core - Babylon.js</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #020617;
        font-family: Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      #game {
        position: relative;
        width: 960px;
        height: 540px;
      }

      #render-canvas {
        display: block;
        width: 960px;
        height: 540px;
      }

      #hud,
      #library,
      #game-over {
        position: absolute;
        z-index: 2;
        color: #f8fafc;
        pointer-events: none;
        white-space: pre-line;
      }

      #hud {
        top: 16px;
        left: 18px;
        font-size: 18px;
        line-height: 1.6;
      }

      #library {
        top: 16px;
        right: 18px;
        color: #cbd5e1;
        font-size: 18px;
      }

      #game-over {
        inset: 0;
        display: none;
        place-items: center;
        background: rgb(2 6 23 / 72%);
        text-align: center;
        font-size: 24px;
        line-height: 1.45;
      }

      #game-over strong {
        display: block;
        margin-bottom: 14px;
        font-size: 42px;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <canvas id="render-canvas" width="960" height="540"></canvas>
      <div id="hud"></div>
      <div id="library">Library: Babylon.js</div>
      <div id="game-over"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
