name: Quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  phaser-quality:
    name: Phaser quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: phaser
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: phaser/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:deploy

  docs-build:
    name: Starlight build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"

  browser-smoke:
    name: Browser release smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: phaser
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: phaser/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox
      - name: Run browser release smoke
        run: xvfb-run --auto-servernum npm run test:e2e:release -- --workers=1
        env:
          ARENA_FIREFOX_HEADED: "1"
          LIBGL_ALWAYS_SOFTWARE: "1"
      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-${{ github.run_id }}-${{ github.run_attempt }}
          path: phaser/test-results/
          if-no-files-found: ignore
          retention-days: 7
